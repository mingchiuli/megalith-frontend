permissions:
  contents: read
name: base-flow
on:
  push:
    branches: [ 'main' ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    concurrency:
      group: megalith-frontend-production-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Dependencies 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - name: Run Tests 🧪
        run: npm run test:unit -- --run
      - name: Build 🏭
        run: npm run build
      - name: Connect to WireGuard
        shell: bash
        env:
          WIREGUARD_CONFIG: ${{ secrets.WIREGUARD_CONFIG }}
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes wireguard-tools
          sudo install -d -m 700 /etc/wireguard
          printf '%s\n' "$WIREGUARD_CONFIG" | sudo tee /etc/wireguard/wg0.conf >/dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
      - name: Deploy 🚀
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: 'megalith'
          target: ${{ secrets.TAERGET }}
      - name: Disconnect WireGuard
        if: ${{ always() }}
        run: |
          sudo wg-quick down wg0 || true
          sudo rm -f /etc/wireguard/wg0.conf
